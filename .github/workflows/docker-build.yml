name: Build Open Source ROS2 Images

# Trigger the automation every time you push code to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
        # ADD THESE TWO LINES HERE 👇
    permissions:
      contents: read
      packages: write
      
    steps:
      # 1. Download your ROS2 source packages into the cloud runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up hardware emulation so the cloud can compile ARM64 for the Pi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Initialize the advanced Docker building system
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to GitHub Container Registry using built-in automated system tokens
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract lowercase repository metadata names to prevent Docker naming errors
      - name: Extract metadata for Docker
        id: meta
        run: |
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # 6. Build the lightweight Raspberry Pi Image (ARM64) and push to registry
      - name: Build and Push Pi Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pi
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo }}:pi

      # 7. Build the Laptop/Simulation Image (AMD64) and push to registry
      - name: Build and Push Laptop Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.laptop
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo }}:laptop
