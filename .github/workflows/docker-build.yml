name: Build and Push ROS 2 Multi-Arch Images

on:
  push:
    branches:
      - main  # Change to master if your default branch is master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Grants permission to upload to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM Emulation)
        uses: docker/setup-qemu-action@v3
        # Lets the GitHub server build ARM64 images for the Raspberry Pi

      - name: Set up Docker Buildx (BuildKit Engine)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Auto-injected by GitHub

      # ============================================================
      # 1. BUILD & PUSH LOCAL PC IMAGE (linux/amd64)
      # ============================================================
      - name: Build and push PC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            TARGETARCH=amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ros_basics:pc
          cache-from: type=gha # Speeds up subsequent builds using GitHub cache
          cache-to: type=gha,mode=max

      # ============================================================
      # 2. BUILD & PUSH RASPBERRY PI IMAGE (linux/arm64)
      # ============================================================
      - name: Build and push Pi image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          build-args: |
            TARGETARCH=arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ros_basics:pi
          cache-from: type=gha
          cache-to: type=gha,mode=max
