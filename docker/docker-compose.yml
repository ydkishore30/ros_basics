version: "3.9"

services:
  ros2:
    image: ros:jazzy-ros-base
    container_name: ros2_robot

    network_mode: host
    privileged: true

    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp

    volumes:
      - ../:/ros_basics

    working_dir: /ros_basics

    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

    stdin_open: true
    tty: true

    command: bash