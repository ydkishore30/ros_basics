slam_toolbox:

  ros__parameters:

    use_sim_time: true

    mode: mapping

    map_frame: map
    odom_frame: odom
    base_frame: base_footprint

    scan_topic: /scan_sim

    resolution: 0.05

    max_laser_range: 12.0

    minimum_time_interval: 0.5

    transform_publish_period: 0.05

    map_update_interval: 2.0

    publish_period_sec: 1.0

    enable_interactive_mode: true