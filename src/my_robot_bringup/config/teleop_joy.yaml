teleop_twist_joy_node:
  ros__parameters:

    # Xbox 360 axis mapping:
    # axis 1 = left stick vertical  (forward/back)
    # axis 0 = left stick horizontal (turn left/right)
    axis_linear:
      x: 1        # left stick vertical  (up=forward, down=backward)
    axis_angular:
      yaw: 3      # right stick horizontal (left=turn left, right=turn right)

    scale_linear:
      x: 0.3        # max forward speed m/s
    scale_angular:
      yaw: 1.5      # max turn rate rad/s

    scale_linear_turbo:
      x: 0.5
    scale_angular_turbo:
      yaw: 2.0

    require_enable_button: false
    enable_button: 5        # LB — hold to enable (unused when require_enable_button: false)
    enable_turbo_button: 5  # LB — hold for turbo

    deadzone: 0.1
