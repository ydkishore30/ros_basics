controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # 1. Verification passed: Names match your URDF joint tokens exactly
    left_wheel_names: ['base_to_left_wheel']
    right_wheel_names: ['base_to_right_wheel']

    # 2. Critical Kinematics Fixes (Calculated from URDF tree data)
    wheel_separation: 0.35
    wheel_radius: 0.04
    wheel_separation_multiplier: 1.0
    odom_frame_id: 'odom'
    base_frame_id: 'base_footprint'

    publish_rate: 50.0
    
    # 3. Cleaned: Duplicate 'cmd_vel_timeout' removed from this block
    cmd_vel_timeout: 0.5
    pose_covariance_diagonal : [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: false
    use_stamped_vel: true

    # Velocity and acceleration limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 1.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    angular.z.max_acceleration: 0.5
    angular.z.min_acceleration: -0.5
