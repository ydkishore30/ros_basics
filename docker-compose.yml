version: "3.8"

services:
  ros:
    build:
      context: .
      dockerfile: docker/Dockerfile

    network_mode: host

    # ============================================================
    # GPU SUPPORT (IMPORTANT FIX)
    # ============================================================
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      # NVIDIA GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      # GUI
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - XAUTHORITY=/root/.Xauthority

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw

    devices:
      - /dev/dri:/dev/dri

    privileged: true

    tty: true
    stdin_open: true